version: 2

sources:
  - name: raw
    database: upsun-ae-challenge
    schema: raw
    description: "Raw data ingested from cloud provider billing exports"

    config:
      freshness:
        warn_after: {count: 30, period: day}
        error_after: {count: 90, period: day}
      loaded_at_field: null

    tables:
      - name: raw_sku_bills
        description: "Provider SKU bills with total CO2 emissions in kg per SKU"
        columns:
          - name: SKU Description
            description: "Unique identifier for the billing SKU"
          - name: provider
            description: "Cloud provider name (e.g. AWS)"
          - name: Total emissions kgCO2
            description: "Total CO2 emissions in kg for this SKU"
          - name: Usage category
            description: "Usage category of the SKU"

      - name: raw_project_usage
        description: "Project-level SKU usage as percentage of total CO2 emissions"
        columns:
          - name: Product
            description: "Project identifier"
          - name: SKU Description
            description: "Reference to the SKU being consumed"
          - name: Region
            description: "Platform.sh region where the project runs"
          - name: Emissions kgCO2 % of total emissions
            description: "Percentage of total CO2 attributed to this project-SKU combination"
